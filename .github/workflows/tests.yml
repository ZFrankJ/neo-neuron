name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ubuntu-tests:
    name: Ubuntu tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt

      - name: Run test suite
        run: make test

  macos-mlx-parity:
    name: macOS MLX parity
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-lock/constraints-macos-mlx.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements-lock/constraints-macos-mlx.txt pytest
          python -m pip install -c requirements-lock/constraints-macos-mlx.txt -r requirements.txt

      - name: Run MLX and LSTM parity tests
        run: |
          make mlx-parity
          make lstm-parity
